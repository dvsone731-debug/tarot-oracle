<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tarot Oracle</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1 class="title">Neon Tarot Oracle</h1>
        <p class="subtitle">Draw your cards. Reveal the unseen.</p>

        <div class="reading-box">
            <pre id="readingText"></pre>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
